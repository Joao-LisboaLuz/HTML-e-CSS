<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="m-first.css" media="all">
    <title>Formulario de login</title>
</head>
<body>
    <main>
        <div id="container">
            <h1>Formulário de Login</h1>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Iure dolorem eius, odio doloribus quam unde atque pariatur voluptatum, libero architecto!</p>
            <form action="POST" autocomplete="on">
                <div class="block">
                    <label for="name">Nome:</label>
                    <input type="name" name="name" id="name" required placeholder="Digite aqui seu nome" size="40">
                </div>
                <div class="block">
                    <label for="email" >Email:</label>
                    <input type="email" name="email" id="email" required placeholder="Digite aqui seu Email" minlength="7" size="40">
                </div>
                <div class="base">
                    <input type="reset">
                    <input type="submit" value="Enviar">
                </div>
            </form>
        </div>
        <div id="background">
            <img src="img/deitado.png" alt="complemento">
        </div>
    </main>
</body>
</html>
